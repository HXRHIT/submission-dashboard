name: weekly-digest

on:
  schedule:
    - cron: "0 0 * * 1"   # 매주 월요일 09:00 KST (00:00 UTC)
  workflow_dispatch: {}    # 수동 실행 가능

permissions:
  contents: write
  issues: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate (리포트용 — ERROR가 있어도 digest는 생성)
        run: python scripts/validate_data.py || true

      - name: Generate calendar (public/submission_deadlines.ics)
        run: python scripts/export_calendar.py

      - name: Generate weekly digest (public/weekly_digest.md/html)
        run: python scripts/generate_weekly_digest.py

      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/
          git diff --cached --quiet || git commit -m "chore: weekly digest & calendar [skip ci]"
          git push

      - name: Deliver as GitHub Issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "📬 Weekly submission digest $(date +%F)" \
            --body-file public/weekly_digest.md \
            --label digest || true

