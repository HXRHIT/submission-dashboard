name: weekly-auto-update

on:
  schedule:
    - cron: "0 0 * * 1"   # Every Monday 09:00 KST (00:00 UTC)
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Weekly automatic source check
        run: python scripts/weekly_auto_update.py --apply-safe --propose

      - name: Validate data
        run: python scripts/validate_data.py

      - name: Generate calendar
        run: python scripts/export_calendar.py

      - name: Generate weekly digest
        run: python scripts/generate_weekly_digest.py

      - name: Commit weekly updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ public/
          git diff --cached --quiet || git commit -m "chore: weekly auto update [skip ci]"
          git push

      - name: Deliver digest as GitHub Issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "Weekly submission digest $(TZ=Asia/Seoul date +%F)" \
            --body-file public/weekly_digest.md \
            --label digest || true
